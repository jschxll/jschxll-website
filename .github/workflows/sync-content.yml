name: Sync Obsidian Content to Main

on:
  push:
    branches:
      - content

permissions:
  contents: write

jobs:
  sync-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull content branch into src/content/posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin content

          # Create temp directory
          mkdir temp-content

          # Checkout markdown files from content branch into temp dir
          git --work-tree=temp-content checkout origin/content -- .

          rsync -av --include='*/' --include='*.md' --exclude='*' temp-content/ src/content/posts/

          rm -rf temp-content

          git add src/content/posts/
          git commit -m "Sync Obsidian content from content branch" || echo "No changes to commit"
          git push