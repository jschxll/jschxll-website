<h3>Recent Posts</h3>
<ul>
  {{ range first 2 (where .Site.RegularPages "Section" "blog") }}
  <li>
    <span
      >{{ .Date.Format (default "02 Jan, 2006" .Site.Params.dateFormat) }}</span
    >
    <br />
    <a href="{{ .Permalink }}">{{ .Title }}</a>
    <p>{{ .Params.description }}</p>
    <hr />
  </li>
  {{ end }}
</ul>
